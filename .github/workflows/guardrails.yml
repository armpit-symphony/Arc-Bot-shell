name: Arc Bot Guardrails

on:
  push:
  pull_request:

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Arc Harness Shell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest
      - name: Compile Arc harness package
        run: python -m compileall arc_bot_shell
      - name: Run tests
        run: pytest
      - name: Release smoke
        run: python scripts/smoke_arc_harness_release.py
      - name: Check whitespace
        run: git diff --check
