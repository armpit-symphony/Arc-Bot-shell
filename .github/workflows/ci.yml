name: CI

on:
  push:
  pull_request:

jobs:
  compile-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependency
        run: python -m pip install pytest
      - name: Compile
        run: python -m compileall .
      - name: Tests
        run: python -m pytest -q
