name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Arc and pinned LIMA
        run: python -m pip install -e . pytest
      - name: Compile
        run: python -m compileall arc_bot_shell
      - name: Tests
        run: pytest -q
      - name: Release smoke
        run: python scripts/smoke_arc_harness_release.py

  windows-operator:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Arc and test tooling
        run: python -m pip install -e . pytest
      - name: Compile Windows manager
        run: python -m compileall arc_bot_shell
      - name: Windows operator unit and script checks
        run: pytest -q tests/test_arc_windows_operator_v0_11.py tests/test_arc_windows_pid_probe_v0_11.py